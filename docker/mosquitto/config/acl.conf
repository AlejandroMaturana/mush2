# ── ACLs for Mush2 MQTT Broker ───────────────────────────────────
# https://mosquitto.org/man/mosquitto-conf-5.html

# ── Firmware (by client_id prefix) ──────────────────────────────
# Firmware puede:
#   - PUBLISH telemetry, status, ack, health, maintenance
#   - SUBSCRIBE commands, config, ota
#
# %c = client_id del dispositivo (ej: device_001_mush2_A0F262E55CBC)
# Se asume client_id con formato: {mqtt_user}_{suffix}

# Publicar telemetria y estado
pattern write mush2/%c/telemetry
pattern write mush2/%c/status
pattern write mush2/%c/ack
pattern write mush2/%c/health
pattern write mush2/%c/maintenance

# Recibir comandos y configuracion
pattern read mush2/%c/commands
pattern read mush2/%c/config
pattern read mush2/%c/ota

# ── Backend bridge ──────────────────────────────────────────────
user backend_bridge
topic read mush2/+/telemetry
topic read mush2/+/status
topic read mush2/+/ack
topic read mush2/+/health
topic read mush2/+/maintenance
topic readwrite mush2/+/actuators
topic readwrite mush2/+/ota
topic readwrite mush2/+/config
