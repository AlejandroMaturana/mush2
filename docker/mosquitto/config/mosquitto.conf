# ── Mosquitto 2.x Configuration ──────────────────────────────────
# Documentation: https://mosquitto.org/man/mosquitto-conf-5.html

# ── Persistence ──────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type all
connection_messages true
log_timestamp true

# ── Default listener (MQTT, internal only) ──────────────────────
# Puerto 1883: accesible solo desde la red Docker (no expuesto al host).
# Usado por el backend bridge para conectarse sin TLS.
listener 1883
allow_anonymous false
password_file /mosquitto/config/password_file
acl_file /mosquitto/config/acl.conf

# ── TLS listener (MQTTS, externo) ──────────────────────────────
# Puerto 8883: expuesto al host para firmware ESP32.
listener 8883
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false
allow_anonymous false
password_file /mosquitto/config/password_file
acl_file /mosquitto/config/acl.conf
