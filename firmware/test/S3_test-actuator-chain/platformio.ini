[platformio]
description = Mush2 — Test cadena de actuadores: SSR + Hysteresis + REMOTE override
src_dir = .
lib_dir = ../../lib

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_mode = qio
board_build.partitions = ../../partitions.csv
board_upload.flash_size = 8MB
board_upload.ota_nvserase = true
build_flags =
    -Wall
    -Werror=return-type
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -I../../src

lib_deps =
    arduinojson@^7.0
