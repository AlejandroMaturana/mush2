# ──────────────────────────────────────────────────────────────────────────────
# deploy-docs.yml — Publica la documentación en GitHub Pages con VitePress
#
# Trigger: push a la rama `gitpages`
# Build:   via workspace monorepo (root pnpm-lock.yaml)
# Deploy:  mecanismo oficial de GitHub Pages (actions/deploy-pages)
# URL:     https://alejandromaturana.github.io/mush2/
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy Docs

on:
  push:
    branches:
      - gitpages
      - gh-pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --filter @mush2/docs

      - name: Build VitePress
        working-directory: ./docs
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
