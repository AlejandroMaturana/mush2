services:
  - type: web
    name: mush2
    runtime: node
    repo: https://github.com/AlejandroMaturana/mush2
    plan: free
    region: ohio
    buildCommand: npm install -g pnpm@10.28.2 && pnpm install --frozen-lockfile && pnpm --filter mush2-frontend run build
    startCommand: node backend/src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3797"
      - key: CORS_ORIGIN
        value: https://mush2.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
