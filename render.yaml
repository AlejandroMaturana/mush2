services:
  - type: web
    name: mush2
    runtime: node
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mush2-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: DB_USER
        fromDatabase:
          name: mush2-db
          property: user
      - key: DB_HOST
        fromDatabase:
          name: mush2-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: mush2-db
          property: database
      - key: DB_PASSWORD
        fromDatabase:
          name: mush2-db
          property: password
      - key: DB_PORT
        fromDatabase:
          name: mush2-db
          property: port

  - type: pgsql
    name: mush2-db
    plan: free
    databaseName: mush2
    ipAllowList: []
